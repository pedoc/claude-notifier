name: daemon-release

# Builds the remote-audio daemon (daemon/) for every platform and publishes the
# binaries to a GitHub Release. Trigger by pushing a tag like `daemon-v1.0.0`.
# Go cross-compiles from a single runner, so no build matrix is needed.

on:
  push:
    tags: ["daemon-v*"]

permissions:
  contents: write # create the release and upload assets

concurrency:
  group: daemon-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false # stdlib-only, no go.sum / modules to cache

      - name: Vet
        working-directory: daemon
        run: go vet ./...

      - name: Cross-compile
        working-directory: daemon
        run: |
          mkdir -p dist
          for t in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
            os=${t%/*}; arch=${t#*/}; ext=""; [ "$os" = windows ] && ext=".exe"
            echo "building $os/$arch"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -ldflags="-s -w" -o "dist/cn-daemon-$os-$arch$ext" .
          done
          ( cd dist && sha256sum * > SHA256SUMS )
          ls -la dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: daemon/dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
