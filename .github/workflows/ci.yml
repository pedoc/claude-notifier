name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # PRs group by PR number (so a force-push cancels the prior run for the
  # same PR). Pushes to main group by ref. This separation prevents the
  # push and pull_request events from racing on the same commit.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm run test:unit

      - name: Hook tests
        run: npm run test:hook

      - name: Package .vsix
        # vsce package is the same on every OS; running it on all three
        # confirms the build is reproducible everywhere we ship to.
        run: npm run package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: claude-notifier-${{ matrix.os }}
          path: "*.vsix"
          retention-days: 14

  smoke:
    # Runs only after CI passes on every matrix arm. macOS-only because
    # scripts/smoke.sh exercises the .js hooks (afplay path is mac-specific,
    # and the rest of the script is bash). PowerShell hook smoke can be
    # added later when we wire pwsh-based smoke for Windows.
    name: smoke (macos)
    needs: ci
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run smoke
