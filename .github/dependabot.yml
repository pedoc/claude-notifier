version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns: ["eslint*", "typescript-eslint", "@typescript-eslint/*"]
      vitest:
        patterns: ["vitest", "@vitest/*"]
      types:
        patterns: ["@types/*"]
      vscode:
        patterns: ["@vscode/*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
